<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#161922"/>
  <rect width="512" height="512" fill="url(#bg)" opacity="0.4"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c8a84b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0e1017" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Border ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c8a84b" stroke-width="2" opacity="0.4"/>
  <!-- Inner star / crest symbol -->
  <text x="256" y="300" text-anchor="middle" font-family="serif" font-size="160" fill="#c8a84b" opacity="0.9">✦</text>
  <!-- COOP text -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-size="40" letter-spacing="12" fill="#c8a84b" opacity="0.7">COOP</text>
</svg>
